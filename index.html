  #stage { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  #frame { width:1920px; height:1080px; border:0; background:#050508; transition:opacity .35s ease; transform-origin:center center; flex-shrink:0; }

  .dot { width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,.22); cursor:pointer; transition:all .3s ease; }
  .dot.active { background:#00E5FF; transform:scale(1.4); box-shadow:0 0 10px rgba(0,229,255,.8); }
  .page-indicator { position:fixed; left:24px; bottom:20px; color:rgba(255,255,255,.35); font:12px/1 Inter,sans-serif; letter-spacing:1px; z-index:1000; user-select:none; }

  .tap-zone { position:fixed; top:0; bottom:0; width:22%; z-index:500; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .tap-left  { left:0; }
  .tap-right { right:0; }
</style>
</head>

<html lang="zh-CN">
<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
        
        :root {
            --bg-dark: #050508;
            --ring-color: rgba(255, 255, 255, 0.3);
            --track-color: rgba(255, 255, 255, 0.15);
            --signal-color: #00E5FF;
            --text-color: #FFFFFF;
        }

        body {
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle at center, #101520 0%, var(--bg-dark) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            overflow: hidden;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: translateY(-5%);
            position: relative;
        }

        /* SVG Sizing */
        .logo-svg {
            width: 280px;
            height: 280px;
            margin-bottom: 40px;
            filter: drop-shadow(0 0 30px rgba(0, 229, 255, 0.05));
        }

        /* Outer Circle */
        .outer-ring {
            fill: none;
            stroke: var(--ring-color);
            stroke-width: 1.5;
        }

        /* Base Line (Darker) */
        .base-track {
            fill: none;
            stroke: var(--track-color);
            stroke-width: 2.5;
            stroke-linejoin: round;
            stroke-linecap: round;
        }

        /* The Animated Action Potential Line (Traces the path) */
        .signal-trace {
            fill: none;
            stroke: var(--signal-color);
            stroke-width: 3;
            stroke-linejoin: round;
            stroke-linecap: round;
            filter: drop-shadow(0 0 8px var(--signal-color));
            
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            
            /* Takes exactly 2 seconds to trace, then 1s pause (Total 3s) */
            animation: trace-line 3s linear infinite;
        }

        /* Nodes (Dots) Base */
        .node {
            fill: var(--bg-dark);
            stroke: var(--ring-color);
            stroke-width: 2;
            transition: all 0.1s;
        }

        /* Perfectly calculated timing delays based on physical path distance!
           Total Path = 242 units. Travel time = 2.0s 
           P1: 0s
           P2(30/242): 0.25s
           P3(93/242): 0.77s
           P4(180/242): 1.49s
           P5(212/242): 1.75s
           P6(242/242): 2.00s
        */
        .node-1 { animation: pulse-node 3s 0.00s infinite; }
        .node-2 { animation: pulse-node 3s 0.25s infinite; }
        .node-3 { animation: pulse-node 3s 0.77s infinite; }
        .node-4 { animation: pulse-node 3s 1.49s infinite; }
        .node-5 { animation: pulse-node 3s 1.75s infinite; }
        .node-6 { animation: pulse-node 3s 2.00s infinite; }

        /* Typography */
        .brand-name {
            font-size: 42px;
            font-weight: 500;
            color: var(--text-color);
            letter-spacing: 16px; 
            margin-right: -16px; 
            margin-bottom: 12px;
        }

        .brand-sub {
            font-size: 24px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 14px;
            margin-right: -14px;
        }

        /* Keyframes */
        @keyframes trace-line {
            0% {
                stroke-dashoffset: 100;
                opacity: 1;
            }
            66.66% { /* At 2.0s (out of 3s) */
                stroke-dashoffset: 0;
                opacity: 1;
            }
            80% {
                stroke-dashoffset: 0;
                opacity: 0;
            }
            100% {
                stroke-dashoffset: 100;
                opacity: 0;
            }
        }

        @keyframes pulse-node {
            0%, 50%, 100% {
                fill: var(--bg-dark);
                stroke: var(--ring-color);
                stroke-width: 2;
                transform: scale(1);
                filter: none;
            }
            5%, 15% { /* Instantly pulses when signal hits it */
                fill: #FFF;
                stroke: var(--signal-color);
                stroke-width: 3;
                transform: scale(1.4);
                filter: drop-shadow(0 0 12px var(--signal-color));
            }
        }
        
        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            mask-image: radial-gradient(circle at center, black 20%, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black 20%, transparent 80%);
        }
    </style>
</head>

            <circle cx="70" cy="110" r="4" class="node node-2" style="transform-origin: 70px 110px;" />

</body>

    <script>
        function drawFlowConnections() {
            const svg = document.getElementById('flowSVG');
            svg.innerHTML = '';

            const decodeNode = document.getElementById('decodeNode');
            const apps = [
                document.getElementById('app1'),
                document.getElementById('app2'),
                document.getElementById('app3'),
                document.getElementById('app4'),
                document.getElementById('app5')
            ];
            const nodes = [
                document.getElementById('node1'),
                document.getElementById('node2'),
                document.getElementById('node3'),
                document.getElementById('node4'),
                document.getElementById('node5')
            ];
            const colors = ['#00E676', '#00E5FF', '#2979FF', '#B388FF', '#3949AB'];

            const canvasRect = document.getElementById('slideCanvas').getBoundingClientRect();

            const getPos = (el, xPct, yPct) => {
                const rect = el.getBoundingClientRect();
                return {
                    x: rect.left - canvasRect.left + (rect.width * xPct),
                    y: rect.top - canvasRect.top + (rect.height * yPct)
                };
            };

            const decodeBottomEdge = getPos(decodeNode, 0.5, 1);
            const decodeTopEdge = getPos(decodeNode, 0.5, 0);

            // Node -> Decode (Upwards)
            nodes.forEach((node, i) => {
                const dot = node.querySelector('.dot');
                const start = getPos(dot, 0.5, 0.5);
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");

                const d = `M ${start.x} ${start.y}
                           C ${start.x} ${start.y - 40},
                             ${decodeBottomEdge.x} ${decodeBottomEdge.y + 40},
                             ${decodeBottomEdge.x} ${decodeBottomEdge.y}`;

                path.setAttribute("d", d);
                path.setAttribute("fill", "none");
                path.setAttribute("stroke", colors[i]);
                path.setAttribute("stroke-width", "2");
                path.setAttribute("class", "flow-path");
                path.style.opacity = 0.5;
                svg.appendChild(path);
            });

            // Decode -> Apps (Upwards)
            apps.forEach((app, i) => {
                const end = getPos(app, 0.5, 1);
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");

                const d = `M ${decodeTopEdge.x} ${decodeTopEdge.y}
                           C ${decodeTopEdge.x} ${decodeTopEdge.y - 40},
                             ${end.x} ${end.y + 20},
                             ${end.x} ${end.y + 5}`;

                path.setAttribute("d", d);
                path.setAttribute("fill", "none");
                path.setAttribute("stroke", colors[i]);
                path.setAttribute("stroke-width", "3");
                path.setAttribute("class", "flow-path");
                path.style.opacity = 0.8;
                svg.appendChild(path);
            });
        }

        function createEEGWaves() {
            const svg = document.getElementById('eegCanvas');
            const colors = ['rgba(0, 230, 118, 0.4)', 'rgba(0, 229, 255, 0.5)', 'rgba(179, 136, 255, 0.3)'];
            const speeds = ['15s', '20s', '12s'];

            const width = svg.parentNode.getBoundingClientRect().width;
            if(width === 0) { setTimeout(createEEGWaves, 100); return; }
            const height = 110;
            const segments = Math.floor(width / 40);

            for(let i=0; i<3; i++) {
                let pathString = `M 0 ${height/2} `;
                let x = 0;
                let totalLen = 0;

                for(let j=0; j<segments+2; j++) {
                    const nextX = x + 40 + Math.random()*20;
                    const cX1 = x + 15;
                    const cY1 = height/2 + (Math.random()-0.5)*90 * (i===1?1.5:1);
                    const cX2 = nextX - 15;
                    const cY2 = height/2 + (Math.random()-0.5)*90 * (i===1?1.5:1);
                    const y = height/2 + (Math.random()-0.5)*20;

                    pathString += `C ${cX1} ${cY1}, ${cX2} ${cY2}, ${nextX} ${y} `;
                    x = nextX;
                    totalLen += 60;
                }

                pathString += `L ${width} ${height/2} `;

                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", pathString);
                path.setAttribute("stroke", colors[i]);
                path.setAttribute("stroke-width", i===1 ? "3" : "2");
                path.setAttribute("class", "wave-path");
                path.style.setProperty('--dash-len', totalLen * 2);
                path.style.setProperty('--speed', speeds[i]);

                path.style.strokeDasharray = (totalLen/8) + ' ' + (totalLen/10);

                svg.appendChild(path);
            }
        }

        window.addEventListener('resize', drawFlowConnections);

        setTimeout(() => {
            createEEGWaves();
            drawFlowConnections();
        }, 300);
    </script>

</body>

<script>
  const TOTAL = 12;
  const frame = document.getElementById('frame');
  const dotsWrap = document.getElementById('dots');
  const pageInd = document.getElementById('pageInd');
  let cur = -1;

  // Build dots
  for (let i=0; i<TOTAL; i++) {
    const d = document.createElement('div');
    d.className = 'dot'; d.dataset.i = i;
    d.onclick = () => go(i);
    dotsWrap.appendChild(d);
  }
  const dots = [...dotsWrap.children];

  function render(i) {
    const tpl = document.getElementById('slide-' + i);
    if (!tpl) return;
    frame.srcdoc = tpl.innerHTML;
    dots.forEach((d, k) => d.classList.toggle('active', k === i));
    pageInd.textContent = String(i+1).padStart(2,'0') + ' / ' + String(TOTAL).padStart(2,'0');
    cur = i;
  }

  function go(i) {
    if (i < 0 || i >= TOTAL || i === cur) return;
    frame.classList.add('fading');
    setTimeout(() => { render(i); frame.classList.remove('fading'); }, 180);
  }

  // Keyboard / wheel
  window.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); go(cur+1); }
    else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); go(cur-1); }
    else if (e.key === 'Home') go(0);
    else if (e.key === 'End') go(TOTAL-1);
  });

  let wheelLock = 0;
  window.addEventListener('wheel', e => {
    if (Math.abs(e.deltaY) < 30) return;
    const now = Date.now(); if (now - wheelLock < 600) return; wheelLock = now;
    go(cur + (e.deltaY > 0 ? 1 : -1));
  }, { passive:true });

  // Receive nav events from inside iframe (if a slide posts them)
  window.addEventListener('message', ev => {
    const m = ev.data; if (!m || typeof m !== 'object') return;
    if (m.type === 'nav_keydown') {
      if (m.key === 'ArrowRight' || m.key === ' ') go(cur+1);
      else if (m.key === 'ArrowLeft') go(cur-1);
    } else if (m.type === 'nav_wheel') {
      go(cur + (m.deltaY > 0 ? 1 : -1));
    }
  });

  // Mobile / tap-zone navigation
  document.getElementById('tapLeft').addEventListener('click', () => go(cur - 1));
  document.getElementById('tapRight').addEventListener('click', () => go(cur + 1));

  // Fit the fixed 1920x1080 iframe to actual window via transform:scale
  function fitFrame() {
    const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    frame.style.transform = 'scale(' + s + ')';
  }
  window.addEventListener('resize', fitFrame);
  fitFrame();

  // Initial load
  render(0);
</script>
